<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Machine Health Dashboard</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        margin: 0;
        color: #fff;
    }

    .container {
        max-width: 950px;
        margin: 40px auto;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(15px);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }

    .field {
        display: flex;
        flex-direction: column;
    }

    label {
        margin-bottom: 5px;
        font-size: 13px;
    }

    input, select {
        padding: 10px;
        border-radius: 10px;
        border: none;
        outline: none;
    }

    .btn-group {
        display: flex;
        justify-content: space-between;
        margin-top: 15px;
    }

    button {
        padding: 12px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    .predict-btn {
        width: 100%;
        background: linear-gradient(45deg, #00c6ff, #0072ff);
        color: white;
        margin-top: 15px;
    }

    .predict-btn:hover {
        transform: scale(1.05);
    }

    .sample-btn {
        width: 48%;
        background: linear-gradient(45deg, #ff7e5f, #feb47b);
        color: white;
    }

    .sample-btn:hover {
        transform: scale(1.05);
    }

    .result {
        margin-top: 25px;
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        display: none;
        animation: fadeIn 0.6s ease;
    }

    .good {
        background: rgba(40,167,69,0.2);
        border: 2px solid #28a745;
    }

    .bad {
        background: rgba(220,53,69,0.2);
        border: 2px solid #dc3545;
    }

    .icon {
        font-size: 40px;
    }

    .bar {
        height: 10px;
        background: #ccc;
        border-radius: 10px;
        margin-top: 10px;
        overflow: hidden;
    }

    .fill {
        height: 100%;
        background: limegreen;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(10px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>
</head>

<body>

<div class="container">
    <h1>⚙️ Machine Failure Predictor</h1>

    <div class="grid">
        <div class="field"><label>Cycle Count</label><input id="time"></div>
        <div class="field"><label>Temperature (°C)</label><input id="temp"></div>
        <div class="field"><label>Pressure (bar)</label><input id="pressure"></div>
        <div class="field"><label>Vibration (mm/s)</label><input id="vibration"></div>
        <div class="field"><label>Speed (RPM)</label><input id="speed"></div>
        <div class="field"><label>Torque (Nm)</label><input id="torque"></div>
    </div>

    <div class="field">
        <label>Operational Mode</label>
        <select id="mode">
            <option>Normal</option>
            <option>Idle</option>
            <option>Overload</option>
            <option>Maintenance</option>
        </select>
    </div>

    <div class="btn-group">
        <button class="sample-btn" onclick="fillSample1()">Sample Input 1</button>
        <button class="sample-btn" onclick="fillSample2()">Sample Input 2</button>
    </div>

    <button class="predict-btn" onclick="predict()">Predict</button>

    <div id="result" class="result"></div>
</div>

<script>
const API_URL = "https://projectdeployment-production-1fc1.up.railway.app/predict";

function getData() {
    return {
        time_cycle_count: +time.value,
        temperature_c: +temp.value,
        pressure_bar: +pressure.value,
        vibration_mm_s: +vibration.value,
        speed_rpm: +speed.value,
        torque_nm: +torque.value,
        operational_mode: mode.value
    };
}

async function predict() {
    const resDiv = document.getElementById("result");

    const res = await fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(getData())
    });

    const data = await res.json();

    let percent = data.failure_probability * 100;

    if (data.prediction === 0) {
        resDiv.className = "result good";
        resDiv.innerHTML = `
            <div class="icon">✔</div>
            <h3>Machine is SAFE</h3>
            Confidence: ${data.confidence}<br>
            <div class="bar"><div class="fill" style="width:${100-percent}%"></div></div>
        `;
    } else {
        resDiv.className = "result bad";
        resDiv.innerHTML = `
            <div class="icon">⚠</div>
            <h3>Failure Risk Detected</h3>
            Confidence: ${data.confidence}<br>
            <div class="bar"><div class="fill" style="width:${percent}%; background:red"></div></div>
        `;
    }

    resDiv.style.display = "block";
}

function fillSample1() {
    time.value=3000; temp.value=60; pressure.value=140;
    vibration.value=1.5; speed.value=1500; torque.value=200;
    mode.value="Normal";
}

function fillSample2() {
    time.value=9000; temp.value=95; pressure.value=210;
    vibration.value=4.5; speed.value=1800; torque.value=320;
    mode.value="Overload";
}
</script>

</body>
</html>
