<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Machine Health Dashboard</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #f5f7fa;
        margin: 0;
        color: #333;
    }

    .container {
        max-width: 950px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
        color: #222;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }

    .field {
        display: flex;
        flex-direction: column;
    }

    label {
        margin-bottom: 5px;
        font-size: 13px;
        font-weight: 600;
    }

    input, select {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
        outline: none;
        transition: 0.2s;
    }

    input:focus, select:focus {
        border-color: #007bff;
        box-shadow: 0 0 5px rgba(0,123,255,0.3);
    }

    .btn-group {
        display: flex;
        justify-content: space-between;
        margin-top: 15px;
    }

    button {
        padding: 12px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    .predict-btn {
        width: 100%;
        background: linear-gradient(45deg, #007bff, #0056b3);
        color: white;
        margin-top: 15px;
    }

    .predict-btn:hover {
        transform: scale(1.03);
    }

    .sample-btn {
        width: 48%;
        background: #6c757d;
        color: white;
    }

    .sample-btn:hover {
        background: #495057;
    }

    .result {
        margin-top: 25px;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        display: none;
        animation: fadeIn 0.5s ease;
    }

    .icon {
        font-size: 35px;
        margin-bottom: 10px;
    }

    .bar {
        height: 10px;
        background: #eee;
        border-radius: 10px;
        margin-top: 10px;
        overflow: hidden;
    }

    .fill {
        height: 100%;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(10px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>
</head>

<body>

<div class="container">
    <h1>⚙️ Machine Failure Predictor</h1>

    <div class="grid">
        <div class="field"><label>Cycle Count</label><input id="time"></div>
        <div class="field"><label>Temperature (°C)</label><input id="temp"></div>
        <div class="field"><label>Pressure (bar)</label><input id="pressure"></div>
        <div class="field"><label>Vibration (mm/s)</label><input id="vibration"></div>
        <div class="field"><label>Speed (RPM)</label><input id="speed"></div>
        <div class="field"><label>Torque (Nm)</label><input id="torque"></div>
    </div>

    <div class="field">
        <label>Operational Mode</label>
        <select id="mode">
            <option>Normal</option>
            <option>Idle</option>
            <option>Overload</option>
            <option>Maintenance</option>
        </select>
    </div>

    <div class="btn-group">
        <button class="sample-btn" onclick="fillSample1()">Sample Input 1</button>
        <button class="sample-btn" onclick="fillSample2()">Sample Input 2</button>
    </div>

    <button class="predict-btn" onclick="predict()">Predict</button>

    <div id="result" class="result"></div>
</div>

<script>
const API_URL = "https://projectdeployment-production-1fc1.up.railway.app/predict";

function getData() {
    return {
        time_cycle_count: +time.value,
        temperature_c: +temp.value,
        pressure_bar: +pressure.value,
        vibration_mm_s: +vibration.value,
        speed_rpm: +speed.value,
        torque_nm: +torque.value,
        operational_mode: mode.value
    };
}

async function predict() {
    const resDiv = document.getElementById("result");

    const res = await fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(getData())
    });

    const data = await res.json();

    let prob = data.failure_probability;
    let percent = prob * 100;

    let status = "";
    let color = "";
    let icon = "";

    // 🎯 Risk Levels
    if (prob < 0.30) {
        status = "Low Risk";
        color = "#28a745";
        icon = "🟢";
    } 
    else if (prob < 0.60) {
        status = "Moderate Risk";
        color = "#ffc107";
        icon = "🟡";
    } 
    else if (prob < 0.80) {
        status = "High Risk";
        color = "#fd7e14";
        icon = "🟠";
    } 
    else {
        status = "Critical Risk";
        color = "#dc3545";
        icon = "🔴";
    }

    // Apply styling dynamically
    resDiv.style.borderLeft = `6px solid ${color}`;
    resDiv.style.background = `${color}15`;

    resDiv.innerHTML = `
        <div class="icon">${icon}</div>
        <h3 style="color:${color}">${status}</h3>

        <p>Confidence: <b>${data.confidence}</b></p>
        <p>Failure Probability: <b>${prob}</b></p>

        <div class="bar">
            <div class="fill" style="width:${percent}%; background:${color}"></div>
        </div>
    `;

    resDiv.style.display = "block";
}

function fillSample1() {
    time.value=3000; temp.value=60; pressure.value=140;
    vibration.value=1.5; speed.value=1500; torque.value=200;
    mode.value="Normal";
}

function fillSample2() {
    time.value=9000; temp.value=95; pressure.value=210;
    vibration.value=4.5; speed.value=1800; torque.value=320;
    mode.value="Overload";
}
</script>

</body>
</html>
